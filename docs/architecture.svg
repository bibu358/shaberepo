<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="990" viewBox="0 0 1680 990" font-family="Hiragino Sans, Hiragino Kaku Gothic ProN, sans-serif">
  <defs>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M1,1 L8,4.5 L1,8 Z" fill="#5F6368"/>
    </marker>
    <marker id="arwB" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M1,1 L8,4.5 L1,8 Z" fill="#4285F4"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1680" height="990" fill="#FFFFFF"/>

  <!-- タイトル -->
  <text x="40" y="52" font-size="26" font-weight="700" fill="#202124">しゃべれぽAI　システムアーキテクチャ</text>

  <!-- 4. 閲覧ルート（上部） -->
  <path d="M1415,206 L1415,100 L160,100 L160,186" fill="none" stroke="#9AA0A6" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arw)"/>
  <text x="800" y="92" font-size="12.5" font-weight="600" fill="#5F6368" text-anchor="middle">4. 蓄積された記録を閲覧</text>

  <!-- ユーザー -->
  <circle cx="160" cy="220" r="21" fill="#5F6368"/>
  <path d="M118,288 a42,36 0 0 1 84,0 z" fill="#5F6368"/>
  <text x="160" y="314" font-size="15" font-weight="700" fill="#202124" text-anchor="middle">ユーザー</text>
  <text x="160" y="333" font-size="12" fill="#5F6368" text-anchor="middle">（ブラウザ）</text>

  <!-- 1. 入力 -->
  <line x1="238" y1="266" x2="424" y2="266" stroke="#5F6368" stroke-width="2" marker-end="url(#arw)"/>
  <text x="322" y="214" font-size="12.5" font-weight="600" fill="#3C4043" text-anchor="middle">1. 音声・画像</text>
  <text x="322" y="232" font-size="12.5" font-weight="600" fill="#3C4043" text-anchor="middle">・マーク位置</text>
  <text x="322" y="250" font-size="12.5" font-weight="600" fill="#3C4043" text-anchor="middle">・テキスト情報</text>

  <!-- Google Cloud 枠 -->
  <rect x="400" y="120" width="780" height="620" rx="12" fill="#F8FAFD" stroke="#4285F4" stroke-width="1.5"/>
  <rect x="424" y="138" width="14" height="14" rx="3" fill="#4285F4"/>
  <text x="446" y="150" font-size="16" font-weight="700" fill="#4285F4">Google Cloud</text>
  <text x="568" y="150" font-size="12" fill="#5F6368">プロジェクト: fieldnotekeeper</text>

  <!-- Cloud Run -->
  <rect x="432" y="176" width="400" height="530" rx="10" fill="#FFFFFF" stroke="#4285F4" stroke-width="1.5"/>
  <rect x="452" y="196" width="13" height="13" rx="3" fill="#4285F4"/>
  <text x="473" y="208" font-size="15" font-weight="700" fill="#202124">Cloud Run</text>
  <text x="562" y="208" font-size="11.5" fill="#5F6368">（asia-northeast1）</text>

  <!-- Streamlit UI card -->
  <rect x="456" y="228" width="352" height="150" rx="8" fill="#E8F0FE"/>
  <text x="474" y="256" font-size="14" font-weight="700" fill="#174EA6">Streamlit アプリ（app.py）</text>
  <text x="474" y="282" font-size="12" fill="#3C4043">・録音・画像・マーク・テキスト情報の入力</text>
  <text x="474" y="304" font-size="12" fill="#3C4043">・プレビュー／編集／再整形／承認</text>
  <text x="474" y="326" font-size="12" fill="#3C4043">・マーク描画（PIL）＝クリック位置に A,B,C…</text>
  <text x="474" y="348" font-size="12" fill="#3C4043">・Notionブロックの組み立て（構造はプログラム）</text>

  <!-- 2. パイプライン -->
  <line x1="632" y1="378" x2="632" y2="426" stroke="#5F6368" stroke-width="2" marker-end="url(#arw)"/>
  <text x="646" y="407" font-size="12.5" font-weight="600" fill="#3C4043">2. パイプライン実行</text>

  <!-- AIエージェント層 card -->
  <rect x="456" y="430" width="352" height="250" rx="8" fill="#FEF7E0" stroke="#F9AB00" stroke-width="2.5"/>
  <text x="474" y="460" font-size="14.5" font-weight="700" fill="#B06000">AIエージェント層（agents/）</text>
  <text x="474" y="490" font-size="12.5" font-weight="600" fill="#3C4043">① 文字起こしAI</text>
  <text x="600" y="490" font-size="12" fill="#5F6368">音声 → transcript</text>
  <text x="474" y="518" font-size="12.5" font-weight="600" fill="#3C4043">② 整形AI</text>
  <text x="600" y="518" font-size="12" fill="#5F6368">transcript＋画像 → 構造化記録</text>
  <text x="474" y="546" font-size="12.5" font-weight="600" fill="#3C4043">③ 検証AI</text>
  <text x="600" y="546" font-size="12" fill="#5F6368">記録 vs ソースの事実チェック</text>
  <text x="474" y="574" font-size="12.5" font-weight="600" fill="#3C4043">④ 修正AI</text>
  <text x="600" y="574" font-size="12" fill="#5F6368">③の指摘を自動修正 → 再検証</text>
  <rect x="474" y="596" width="316" height="60" rx="6" fill="#FDE293" opacity="0.55"/>
  <text x="632" y="622" font-size="12" font-weight="700" fill="#B06000" text-anchor="middle">③ ⇄ ④ 自己修復ループ（最大2周）</text>
  <text x="632" y="642" font-size="11.5" fill="#B06000" text-anchor="middle">「事実の改変」だけ自動修正・それ以外は人へ提示</text>

  <!-- Vertex AI -->
  <rect x="880" y="340" width="268" height="130" rx="10" fill="#FFFFFF" stroke="#4285F4" stroke-width="1.5"/>
  <rect x="900" y="360" width="13" height="13" rx="3" fill="#4285F4"/>
  <text x="921" y="372" font-size="15" font-weight="700" fill="#202124">Vertex AI</text>
  <text x="1010" y="372" font-size="11.5" fill="#5F6368">（location: global）</text>
  <text x="900" y="404" font-size="14" font-weight="700" fill="#174EA6">Gemini 2.5 Flash</text>
  <text x="900" y="428" font-size="11.5" fill="#5F6368">全AI呼び出しを担当</text>
  <text x="900" y="448" font-size="11.5" fill="#5F6368">structured output（型どおりの出力）</text>

  <!-- Agent → Vertex -->
  <path d="M808,540 L1014,540 L1014,474" fill="none" stroke="#4285F4" stroke-width="2" marker-end="url(#arwB)"/>
  <text x="920" y="560" font-size="12" font-weight="600" fill="#174EA6">生成リクエスト</text>

  <!-- Secret Manager -->
  <rect x="880" y="600" width="268" height="82" rx="10" fill="#FFFFFF" stroke="#9AA0A6" stroke-width="1.3"/>
  <rect x="900" y="618" width="13" height="13" rx="3" fill="#9AA0A6"/>
  <text x="921" y="630" font-size="13.5" font-weight="700" fill="#202124">Secret Manager</text>
  <text x="900" y="656" font-size="11.5" fill="#5F6368">drive-oauth-token → 起動時に供給</text>
  <line x1="878" y1="641" x2="836" y2="641" stroke="#9AA0A6" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arw)"/>

  <!-- Notion -->
  <rect x="1260" y="206" width="310" height="140" rx="10" fill="#FFFFFF" stroke="#37352F" stroke-width="1.8"/>
  <rect x="1280" y="226" width="13" height="13" rx="3" fill="#37352F"/>
  <text x="1301" y="238" font-size="15" font-weight="700" fill="#202124">Notion（記録DB）</text>
  <text x="1280" y="268" font-size="12" fill="#3C4043">・記録ページを作成（構造化ブロック）</text>
  <text x="1280" y="290" font-size="12" fill="#3C4043">・マーク付き画像を File Upload API で直接添付</text>
  <text x="1280" y="312" font-size="12" fill="#3C4043">・サマリ → 詳細 → ソース（原文トグル）</text>
  <text x="1280" y="334" font-size="12" fill="#3C4043">・ソースに Drive フォルダURLを記載</text>

  <!-- 3. 保存 -->
  <line x1="834" y1="266" x2="1254" y2="266" stroke="#5F6368" stroke-width="2" marker-end="url(#arw)"/>
  <text x="1044" y="252" font-size="12.5" font-weight="600" fill="#3C4043" text-anchor="middle">3. 承認後：記録＋画像を保存</text>

  <!-- Google Drive -->
  <rect x="1260" y="400" width="310" height="100" rx="10" fill="#FFFFFF" stroke="#34A853" stroke-width="1.6" stroke-dasharray="7 5"/>
  <rect x="1280" y="420" width="13" height="13" rx="3" fill="#34A853"/>
  <text x="1301" y="432" font-size="15" font-weight="700" fill="#202124">Google Drive</text>
  <text x="1280" y="462" font-size="12" fill="#3C4043">・生画像（無加工の原本）を保存（OAuth）</text>
  <text x="1280" y="484" font-size="12" fill="#3C4043">・記録ごとにフォルダを作成</text>

  <!-- 3'. バックアップ -->
  <path d="M834,308 L1214,308 L1214,450 L1254,450" fill="none" stroke="#5F6368" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#arw)"/>
  <text x="1044" y="298" font-size="12" font-weight="600" fill="#5F6368" text-anchor="middle">3'. 生画像をバックアップ</text>

  <!-- CI/CD レーン -->
  <rect x="400" y="780" width="780" height="150" rx="10" fill="#F1F3F4"/>
  <text x="424" y="810" font-size="14" font-weight="700" fill="#5F6368">CI/CD</text>

  <rect x="440" y="828" width="200" height="74" rx="8" fill="#FFFFFF" stroke="#5F6368" stroke-width="1.3"/>
  <text x="540" y="856" font-size="13.5" font-weight="700" fill="#202124" text-anchor="middle">GitHub</text>
  <text x="540" y="878" font-size="11.5" fill="#5F6368" text-anchor="middle">shaberepo（公開リポジトリ）</text>

  <rect x="690" y="828" width="200" height="74" rx="8" fill="#FFFFFF" stroke="#5F6368" stroke-width="1.3"/>
  <text x="790" y="856" font-size="13.5" font-weight="700" fill="#202124" text-anchor="middle">GitHub Actions</text>
  <text x="790" y="878" font-size="11" fill="#5F6368" text-anchor="middle">gcloud run deploy --source</text>

  <rect x="940" y="828" width="200" height="74" rx="8" fill="#FFFFFF" stroke="#4285F4" stroke-width="1.3"/>
  <rect x="978" y="844" width="12" height="12" rx="3" fill="#4285F4"/>
  <text x="1050" y="856" font-size="13.5" font-weight="700" fill="#202124" text-anchor="middle">Cloud Build</text>
  <text x="1040" y="878" font-size="11.5" fill="#5F6368" text-anchor="middle">コンテナをビルド</text>

  <line x1="642" y1="865" x2="686" y2="865" stroke="#5F6368" stroke-width="2" marker-end="url(#arw)"/>
  <text x="664" y="852" font-size="10.5" fill="#5F6368" text-anchor="middle">push</text>
  <line x1="892" y1="865" x2="936" y2="865" stroke="#5F6368" stroke-width="2" marker-end="url(#arw)"/>

  <!-- Cloud Build → Cloud Run -->
  <path d="M1040,826 L1040,760 L632,760 L632,710" fill="none" stroke="#5F6368" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#arw)"/>
  <text x="836" y="752" font-size="12" font-weight="600" fill="#5F6368" text-anchor="middle">コンテナをデプロイ（main へ push で自動）</text>

  <!-- 凡例 -->
  <text x="40" y="964" font-size="11.5" fill="#9AA0A6">実線＝メインのデータ／リクエストの流れ　　破線＝補助的な流れ（バックアップ・供給・デプロイ・閲覧）　　※ すべてのAI処理は Vertex AI 経由の Gemini 2.5 Flash</text>
</svg>
