<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8"><style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1200px;height:675px;overflow:hidden;}
  body{
    font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif;
    background:#0a0a0b;
    background-image:radial-gradient(circle at 50% 42%, #16171a 0%, #0a0a0b 62%);
    color:#f5f5f4; display:flex; flex-direction:column;
    align-items:center; justify-content:center; position:relative;
  }
  /* うっすらグリッド */
  .grid{position:absolute; inset:0;
    background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
    background-size:56px 56px; mask-image:radial-gradient(circle at 50% 45%,#000 30%,transparent 78%);}
  .mic{
    width:88px;height:88px;border-radius:24px;
    background:linear-gradient(145deg,#00c2b8,#0891b2);
    display:flex;align-items:center;justify-content:center;
    font-size:44px; margin-bottom:30px;
    box-shadow:0 0 60px rgba(8,145,178,.45), inset 0 1px 0 rgba(255,255,255,.25);
    position:relative; z-index:2;
  }
  h1{font-size:82px;font-weight:800;letter-spacing:.01em;position:relative;z-index:2;}
  h1 .ai{background:linear-gradient(145deg,#2dd4bf,#22d3ee);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .sub{margin-top:22px;font-size:22px;color:#a1a1aa;letter-spacing:.04em;line-height:1.7;text-align:center;position:relative;z-index:2;}
  .sub b{color:#e4e4e7;font-weight:700;}
  .pills{margin-top:34px;display:flex;gap:12px;position:relative;z-index:2;}
  .pill{font-size:15px;color:#d4d4d8;border:1px solid #2a2a2e;background:rgba(255,255,255,.03);
    border-radius:999px;padding:9px 20px;}
  .pill span{color:#2dd4bf;}
</style></head><body>
  <div class="grid"></div>
  <div class="mic">🎙️</div>
  <h1>しゃべれぽ<span class="ai">AI</span></h1>
  <div class="sub">音声と画像から、実験や調査などの活動を<br><b>Notionに記録化する</b>AIエージェント</div>
  <div class="pills">
    <div class="pill"><span>◉</span> 話す＋撮る</div>
    <div class="pill"><span>◉</span> 事実を変えない</div>
    <div class="pill"><span>◉</span> Notionに残る</div>
  </div>
</body></html>
