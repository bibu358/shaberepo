<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8"><style>
  @font-face{font-family:"Kiwami";src:url("file:///Users/takahashiken/Library/Fonts/GenEiKiwamiGo.ttf");}
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1200px;height:675px;overflow:hidden;}
  body{
    font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif;
    background:#08090b;
    background-image:radial-gradient(ellipse 60% 55% at 50% 46%, #14171c 0%, #08090b 70%);
    color:#fafafa; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:30px; position:relative;
  }
  .grid{position:absolute; inset:0;
    background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
    background-size:60px 60px; mask-image:radial-gradient(circle at 50% 46%,#000 32%,transparent 80%);}
  h1{font-family:"Kiwami";font-size:118px;font-weight:400;letter-spacing:.04em;line-height:1;position:relative;z-index:2;}
  h1 .ai{
    background:linear-gradient(120deg,#5eead4,#22d3ee);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    margin-left:.05em;
  }
  .sub{font-size:25px;color:#a1a1aa;letter-spacing:.06em;line-height:1.75;text-align:center;position:relative;z-index:2;}
  .sub b{color:#e4e4e7;font-weight:700;}
</style></head><body>
  <div class="grid"></div>
  <h1>しゃべれぽ<span class="ai">AI</span></h1>
  <div class="sub">音声と画像から、実験や調査などの活動を<br><b>Notionに記録化する</b>AIエージェント</div>
</body></html>
