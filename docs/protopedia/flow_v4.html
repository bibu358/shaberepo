<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8"><style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1200px;height:675px;overflow:hidden;}
  body{
    font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif;
    background:#08090b;
    background-image:radial-gradient(ellipse 62% 60% at 50% 50%, #14171c 0%, #08090b 72%);
    color:#fafafa; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:78px; position:relative;
  }
  .grid{position:absolute; inset:0;
    background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
    background-size:60px 60px; mask-image:radial-gradient(circle at 50% 50%,#000 38%,transparent 84%);}
  .head{font-size:34px;font-weight:700;letter-spacing:.02em;z-index:2;text-align:center;}
  .head b{background:linear-gradient(120deg,#5eead4,#22d3ee);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .row{display:flex;align-items:center;gap:34px;z-index:2;}
  .node{display:flex;flex-direction:column;align-items:center;gap:24px;width:246px;}
  .box{
    width:150px;height:150px;border-radius:34px;
    display:flex;align-items:center;justify-content:center;gap:10px;
    border:1px solid #26262b;background:#111214;
  }
  .box.dual{gap:8px;}
  .agent .box{
    background:linear-gradient(150deg,#0e7490,#0891b2);
    border-color:#2dd4bf55;
    box-shadow:0 0 54px rgba(13,148,136,.5), inset 0 1px 0 rgba(255,255,255,.18);
  }
  .label{font-size:24px;font-weight:700;letter-spacing:.02em;}
  .arrow{z-index:2;}
</style></head><body>
  <div class="grid"></div>
  <div class="head">話して、印をつけるだけ。<b>AIエージェント</b>がNotionに記録化する</div>
  <div class="row">

    <!-- 入力：マイク ＋ 画像+マーク -->
    <div class="node">
      <div class="box dual">
        <!-- mic -->
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#e4e4e7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/>
        </svg>
        <!-- image + mark -->
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#e4e4e7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="15" rx="2.5"/><circle cx="8.5" cy="9" r="1.6"/><path d="M4 17l5-5 4 4 3-2 4 4"/>
        </svg>
      </div>
      <div class="label">音声 ＋ 画像</div>
    </div>

    <!-- arrow -->
    <svg class="arrow" width="60" height="30" viewBox="0 0 60 30" fill="none" stroke="#52525b" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <line x1="4" y1="15" x2="50" y2="15"/><polyline points="40,6 52,15 40,24"/>
    </svg>

    <!-- AIエージェント -->
    <div class="node agent">
      <div class="box">
        <!-- robot head -->
        <svg width="76" height="76" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="3" x2="12" y2="6"/><circle cx="12" cy="2.3" r="1"/>
          <rect x="4" y="6" width="16" height="12" rx="3.5"/>
          <circle cx="9" cy="12" r="1.5" fill="#fff" stroke="none"/><circle cx="15" cy="12" r="1.5" fill="#fff" stroke="none"/>
          <line x1="2" y1="11" x2="2" y2="14"/><line x1="22" y1="11" x2="22" y2="14"/>
        </svg>
      </div>
      <div class="label">AIエージェント</div>
    </div>

    <!-- arrow -->
    <svg class="arrow" width="60" height="30" viewBox="0 0 60 30" fill="none" stroke="#52525b" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <line x1="4" y1="15" x2="50" y2="15"/><polyline points="40,6 52,15 40,24"/>
    </svg>

    <!-- Notion（記録＝ノート） -->
    <div class="node">
      <div class="box">
        <svg width="70" height="70" viewBox="0 0 24 24" fill="none" stroke="#e4e4e7" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 3h9l4 4v13a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1Z"/>
          <path d="M14 3v5h5"/><line x1="8.5" y1="13" x2="15.5" y2="13"/><line x1="8.5" y1="16.5" x2="15.5" y2="16.5"/>
        </svg>
      </div>
      <div class="label">Notion</div>
    </div>

  </div>
</body></html>
