<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8"><style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1200px;height:675px;overflow:hidden;}
  body{
    font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif;
    background:#08090b;
    background-image:radial-gradient(ellipse 60% 55% at 50% 46%, #14171c 0%, #08090b 70%);
    color:#fafafa; display:flex; flex-direction:column;
    align-items:center; justify-content:center; position:relative;
  }
  .grid{position:absolute; inset:0;
    background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
    background-size:60px 60px; mask-image:radial-gradient(circle at 50% 46%,#000 32%,transparent 80%);}
  .lockup{display:flex;align-items:center;gap:26px;position:relative;z-index:2;}
  .mark{width:96px;height:96px;filter:drop-shadow(0 10px 30px rgba(20,184,166,.35));}
  h1{font-size:96px;font-weight:800;letter-spacing:.02em;line-height:1;}
  h1 .ai{
    background:linear-gradient(120deg,#5eead4,#22d3ee);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    margin-left:.06em;
  }
  .rule{width:132px;height:4px;border-radius:2px;margin:40px 0 26px;
    background:linear-gradient(90deg,#2dd4bf,#22d3ee);position:relative;z-index:2;}
  .sub{font-size:25px;color:#a1a1aa;letter-spacing:.05em;line-height:1.75;text-align:center;position:relative;z-index:2;}
  .sub b{color:#e4e4e7;font-weight:700;}
</style></head><body>
  <div class="grid"></div>
  <div class="lockup">
    <svg class="mark" viewBox="0 0 100 100">
      <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#2dd4bf"/><stop offset="1" stop-color="#0e7490"/></linearGradient></defs>
      <path d="M24 28 h52 a7 7 0 0 1 7 7 v28 a7 7 0 0 1 -7 7 H45 l-14 12 v-12 h-7 a7 7 0 0 1 -7 -7 V35 a7 7 0 0 1 7 -7 Z" fill="url(#g)"/>
      <g stroke="#08090b" stroke-width="4.6" stroke-linecap="round">
        <line x1="40" y1="42" x2="40" y2="56"/><line x1="50" y1="36" x2="50" y2="62"/><line x1="60" y1="44" x2="60" y2="54"/>
      </g>
    </svg>
    <h1>しゃべれぽ<span class="ai">AI</span></h1>
  </div>
  <div class="rule"></div>
  <div class="sub">音声と画像から、実験や調査などの活動を<br><b>Notionに記録化する</b>AIエージェント</div>
</body></html>
