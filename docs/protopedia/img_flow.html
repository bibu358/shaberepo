<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8"><style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1200px;height:675px;overflow:hidden;}
  body{
    font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif;
    background:#0a0a0b;
    background-image:radial-gradient(circle at 50% 45%, #16171a 0%, #0a0a0b 65%);
    color:#f5f5f4; display:flex; flex-direction:column;
    align-items:center; justify-content:center; position:relative;
  }
  .grid{position:absolute; inset:0;
    background-image:linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(255,255,255,.022) 1px,transparent 1px);
    background-size:56px 56px; mask-image:radial-gradient(circle at 50% 50%,#000 35%,transparent 82%);}
  h2{font-size:30px;font-weight:700;margin-bottom:56px;color:#e4e4e7;letter-spacing:.02em;z-index:2;}
  h2 b{background:linear-gradient(145deg,#2dd4bf,#22d3ee);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .row{display:flex;align-items:center;gap:8px;z-index:2;}
  .node{display:flex;flex-direction:column;align-items:center;width:200px;}
  .icon{
    width:130px;height:130px;border-radius:30px;
    display:flex;align-items:center;justify-content:center;font-size:58px;
    border:1px solid #2a2a2e; background:#141416; position:relative;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
  }
  /* 入力ノード：2アイコンを重ねる */
  .inputs{display:flex;gap:14px;}
  .inputs .icon{width:96px;height:96px;font-size:42px;border-radius:24px;}
  .agent .icon{
    background:linear-gradient(145deg,#0e7490,#0891b2);
    border-color:#2dd4bf66;
    box-shadow:0 0 46px rgba(8,145,178,.5), inset 0 1px 0 rgba(255,255,255,.2);
  }
  .label{margin-top:18px;font-size:20px;font-weight:700;color:#f5f5f4;text-align:center;}
  .desc{margin-top:6px;font-size:14px;color:#8b8b90;text-align:center;line-height:1.5;}
  .arrow{color:#3f3f46;font-size:40px;margin:0 4px 44px;z-index:2;}
  .mark-badge{
    position:absolute;top:-8px;right:-8px;width:30px;height:30px;border-radius:50%;
    border:3px solid #f43f5e;background:#0a0a0b;color:#f43f5e;
    font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;
  }
  .cap{position:absolute;bottom:56px;font-size:15px;color:#71717a;z-index:2;letter-spacing:.03em;}
</style></head><body>
  <div class="grid"></div>
  <h2>話して、印をつけるだけ。<b>AIエージェント</b>がNotionに記録化する</h2>
  <div class="row">
    <div class="node">
      <div class="inputs">
        <div class="icon">🎙️</div>
        <div class="icon">🖼️<div class="mark-badge">A</div></div>
      </div>
      <div class="label">音声 ＋ 画像マーク</div>
      <div class="desc">話す／見てほしい箇所に印</div>
    </div>
    <div class="arrow">→</div>
    <div class="node agent">
      <div class="icon">🤖</div>
      <div class="label">AIエージェント</div>
      <div class="desc">整形 → 検証 → 自己修復</div>
    </div>
    <div class="arrow">→</div>
    <div class="node">
      <div class="icon">📒</div>
      <div class="label">Notion</div>
      <div class="desc">事実を保った記録が残る</div>
    </div>
  </div>
  <div class="cap">現場の「話す・撮る」だけで、活用できる記録が資産になる</div>
</body></html>
